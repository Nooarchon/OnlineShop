<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Store App — Alza Style</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: white;
            margin: 0;
        }

        nav {
            background: #222;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #007bff;
        }

        .logo {
            font-size: 1.5rem;
            color: #007bff;
        }

        .container {
            display: flex;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* --- SIDEBAR STYLE --- */
        .sidebar {
            width: 280px;
            border-right: 1px solid #333;
            padding-right: 20px;
        }

        .category-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 25px;
        }

        .category-btn {
            background: #2a2a2a;
            color: #ccc;
            border: 1px solid #444;
            padding: 12px 15px;
            text-align: left;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s ease;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

            .category-btn:hover {
                background: #3a3a3a;
                border-color: #666;
            }

            .category-btn.active {
                background: #007bff;
                color: white;
                border-color: #0056b3;
                box-shadow: 0 4px 10px rgba(0, 123, 255, 0.3);
            }

        .filter-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #333;
        }

        .genre-checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #bbb;
        }

            .genre-checkbox-label:hover {
                color: white;
            }

        /* --- CATALOG --- */
        .catalog {
            flex-grow: 1;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            padding-left: 30px;
        }

        .game-card {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            transition: transform 0.2s;
            border: 1px solid #333;
        }

            .game-card:hover {
                transform: translateY(-5px);
                border-color: #007bff;
            }

        .btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 18px;
            cursor: pointer;
            border-radius: 6px;
            font-weight: bold;
        }

            .btn:hover {
                background: #0056b3;
            }

        /* Modals */
        .modal {
            background: rgba(0,0,0,0.85);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #333;
            padding: 30px;
            border-radius: 12px;
            width: 400px;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><strong>GAME STORE</strong></div>
        <div id="auth-buttons">
            <button class="btn" onclick="showModal('login')">Login</button>
            <button class="btn" style="background:#444" onclick="showModal('signup')">Sign Up</button>
        </div>
        <div id="user-info" style="display:none">
            <span id="username" style="margin-right: 15px;"></span>
            <button class="btn" onclick="showCart()" style="background: #28a745;">🛒 Cart (<span id="cart-count">0</span>)</button>
            <button class="btn" onclick="logout()" style="background: #666;">Logout</button>
        </div>
    </nav>

    <div class="container">
        <aside class="sidebar">
            <h3>Categories</h3>
            <div class="category-group" id="category-btns">
                <button class="category-btn active" onclick="changeCategory('Games', this)">🎮 Games</button>
                <button class="category-btn" onclick="changeCategory('Comics', this)">📚 Comics</button>
                <button class="category-btn" onclick="changeCategory('Movies', this)">🎬 Movies</button>
                <button class="category-btn" onclick="changeCategory('TVSeries', this)">📺 TV Series</button>
                <button class="category-btn" onclick="changeCategory('Music', this)">🎵 Music</button>
            </div>

            <div class="filter-section">
                <h4>Genres</h4>
                <div id="genre-filters"></div>
            </div>
        </aside>

        <main class="catalog" id="product-list"></main>
    </div>

    <div id="auth-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title">Login</h2>
            <input type="email" id="email" placeholder="Email" style="width:95%; margin-bottom:10px; padding: 10px; border-radius:4px; border:none;"><br>
            <input type="password" id="password" placeholder="Password" style="width:95%; margin-bottom:10px; padding: 10px; border-radius:4px; border:none;"><br>
            <button class="btn" onclick="handleAuth()">Submit</button>
            <button class="btn" style="background:#666" onclick="hideModal()">Close</button>
        </div>
    </div>

    <div id="cart-modal" class="modal">
        <div class="modal-content" style="width: 500px;">
            <h2>Your Cart</h2>
            <div id="cart-items-list" style="margin-bottom: 20px; max-height: 300px; overflow-y: auto;"></div>
            <div style="border-top: 1px solid #555; padding-top: 10px;">
                <strong>Total: $<span id="cart-total">0</span></strong>
            </div>
            <div style="margin-top: 20px; display: flex; justify-content: space-between;">
                <button class="btn" style="background:#28a745" onclick="processPayment()">Checkout</button>
                <button class="btn" style="background:#666" onclick="hideCart()">Close</button>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let activeCategory = 'Games';

        const categoryConfig = {
            "Games": ["RPG", "Action", "Horror", "Stealth", "Adventure"],
            "Comics": ["Dark Fantasy", "Thriller", "Detective", "Superhero"],
            "Movies": ["Sci-Fi", "Action", "Drama", "Horror"],
            "TVSeries": ["Drama", "Satire", "Thriller", "Fantasy", "Sci-Fi"],
            "Music": ["Electronic", "Rock", "Pop", "Jazz", "Metal"]
        };

        // --- FILTER & PRODUCT LOADING ---

        function changeCategory(cat, element) {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            element.classList.add('active');
            activeCategory = cat;
            renderGenres();
            loadProducts();
        }

        function renderGenres() {
            const container = document.getElementById('genre-filters');
            const genres = categoryConfig[activeCategory] || [];
            container.innerHTML = genres.map(g => `
                <label class="genre-checkbox-label">
                    <input type="checkbox" class="genre-checkbox" value="${g}" onchange="loadProducts()"> ${g}
                </label>
            `).join('');
        }

        async function loadProducts() {
            const genres = Array.from(document.querySelectorAll('.genre-checkbox:checked')).map(c => c.value);
            const params = new URLSearchParams();
            params.append('category', activeCategory);
            genres.forEach(g => params.append('genres', g));

            try {
                const response = await fetch(`/api/games?${params.toString()}`);
                if (!response.ok) throw new Error();
                const data = await response.json();
                renderProducts(data);
            } catch (error) {
                // Fallback mock data
                renderProducts([{ id: "1", name: "Backend Connection Error", price: 0 }]);
            }
        }

        function renderProducts(products) {
            const list = document.getElementById('product-list');
            list.innerHTML = products.map(g => `
                <div class="game-card">
                    <div style="font-size:40px; margin-bottom:10px;">📦</div>
                    <h3>${g.name}</h3>
                    <p style="color:#007bff; font-weight:bold; font-size:1.2rem;">$${g.price}</p>
                    <button class="btn" onclick="addToCart('${g.id}')">Add to Cart</button>
                </div>
            `).join('');
        }

        // --- AUTH FUNCTIONS ---

        function showModal(type) {
            document.getElementById('modal-title').innerText = type === 'login' ? 'Login' : 'Sign Up';
            document.getElementById('auth-modal').dataset.type = type;
            document.getElementById('auth-modal').style.display = 'flex';
        }
        function hideModal() { document.getElementById('auth-modal').style.display = 'none'; }

        async function handleAuth() {
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const type = document.getElementById('auth-modal').dataset.type;

            try {
                const response = await fetch(`/api/auth/${type}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: emailInput.value,
                        password: passwordInput.value
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    if (type === 'login') {
                        currentUser = data.email;
                        updateUI();
                        hideModal(); // Close window
                        alert("Welcome back!");
                    } else {
                        // SIGN UP SUCCESS
                        alert("Registration successful! You can now log in.");

                        // 1. Clear the inputs so the next user doesn't see them
                        emailInput.value = '';
                        passwordInput.value = '';

                        // 2. Hide the modal entirely
                        hideModal();
                    }
                } else {
                    alert(data.message || "Error during authentication");
                }
            } catch (e) {
                alert("Server connection failed. Is the backend running?");
            }
        }

        function updateUI() {
            const authButtons = document.getElementById('auth-buttons');
            const userInfo = document.getElementById('user-info');
            if (currentUser) {
                authButtons.style.display = 'none';
                userInfo.style.display = 'block';
                document.getElementById('username').innerText = currentUser;
                updateCartCount();
            } else {
                authButtons.style.display = 'block';
                userInfo.style.display = 'none';
            }
        }

        function logout() {
            currentUser = null;
            updateUI();
        }

        // --- CART FUNCTIONS ---

        async function updateCartCount() {
            if (!currentUser) return;
            const response = await fetch(`/api/cart/${currentUser}`);
            const cartItems = await response.json();
            const count = cartItems.reduce((acc, item) => acc + item.quantity, 0);
            document.getElementById('cart-count').innerText = count;
        }

        async function addToCart(productId) {
            if (!currentUser) { showModal('login'); return; }

            const response = await fetch('/api/cart/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userEmail: currentUser, productId: productId })
            });

            if (response.ok) {
                updateCartCount();
                alert("Added to cart!");
            } else {
                const err = await response.json();
                alert(err.message);
            }
        }

        function hideCart() { document.getElementById('cart-modal').style.display = 'none'; }

        async function showCart() {
            if (!currentUser) return;
            try {
                const response = await fetch(`/api/cart/${currentUser}`);
                const cartItems = await response.json();
                const list = document.getElementById('cart-items-list');
                let total = 0;

                list.innerHTML = cartItems.map(item => {
                    total += item.product.price * item.quantity;
                    return `
                        <div style="display:flex; justify-content:space-between; align-items:center; padding:10px; border-bottom:1px solid #444;">
                            <div>
                                <strong>${item.product.name}</strong><br>
                                <small>$${item.product.price} x ${item.quantity}</small>
                            </div>
                            <button class="btn" style="background:#dc3545; padding:5px;" onclick="removeFromCart('${item.product.id}')">Delete</button>
                        </div>`;
                }).join('');

                if (cartItems.length === 0) list.innerHTML = "<p>Cart is empty</p>";
                document.getElementById('cart-total').innerText = total.toFixed(2);
                document.getElementById('cart-modal').style.display = 'flex';
            } catch (e) { alert("Could not load cart"); }
        }

        async function removeFromCart(productId) {
            await fetch('/api/cart/remove', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userEmail: currentUser, productId: productId })
            });
            showCart(); // Refresh the list
            updateCartCount();
        }

        async function processPayment() {
            if (confirm("Proceed to pay?")) {
                const response = await fetch(`/api/cart/clear/${currentUser}`, { method: 'DELETE' });
                if (response.ok) {
                    alert("Order placed!");
                    updateCartCount();
                    hideCart();
                }
            }
        }

        // Initialize
        renderGenres();
        loadProducts();
    </script>
</body>
</html>
