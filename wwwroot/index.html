<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Game Store App</title>
    <style>
        body {
            font-family: sans-serif;
            background: #1a1a1a;
            color: white;
            margin: 0;
        }

        nav {
            background: #333;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
        }

        .container {
            display: flex;
            padding: 20px;
        }

        .sidebar {
            width: 250px;
            border-right: 1px solid #444;
            padding-right: 20px;
        }

        .catalog {
            flex-grow: 1;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            padding-left: 20px;
        }

        .game-card {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 4px;
        }

        .modal {
            background: rgba(0,0,0,0.8);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #333;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><strong>GAME STORE</strong></div>
        <div id="auth-buttons">
            <button class="btn" onclick="showModal('login')">Log In</button>
            <button class="btn" onclick="showModal('signup')">Sign Up</button>
        </div>
        <div id="user-info" style="display:none">
            <span id="username"></span>
            <button class="btn" onclick="logout()">Sign Out</button>
        </div>
    </nav>

    <div class="container">
        <aside class="sidebar">
            <h3>Filter</h3>
            <h4>Genre</h4>
            <select id="genre-filter" onchange="loadProducts()">
                <option value="">All genres</option>
                <option value="RPG">RPG</option>
                <option value="Horror">Horror</option>
                <option value="Action">Action</option>
                <option value="Interactive Movie">Interactive Movie</option>
                <option value="Stealth">Stealth</option>
            </select>

            <h4>Developer</h4>
            <select id="dev-filter" onchange="loadProducts()">
                <option value="">All developers</option>
                <option value="Sandfall Interactive">Sandfall Interactive</option>
                <option value="Rockstar Games">Rockstar Games</option>
                <option value="Telltale Games">Telltale Games</option>
                <option value="Quantic Dream">Quantic Dream</option>
                <option value="Capcom">Capcom</option>
            </select>
        </aside>

        <main class="catalog" id="product-list">
        </main>
    </div>

    <div id="auth-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title">Login</h2>
            <input type="email" id="email" placeholder="Email" style="width:100%; margin-bottom:10px;"><br>
            <input type="password" id="password" placeholder="Password" style="width:100%; margin-bottom:10px;"><br>
            <button class="btn" onclick="handleAuth()">Send</button>
            <button class="btn" style="background:#666" onclick="hideModal()">Close</button>
        </div>
    </div>

    <script>
        let currentUser = null;

        function showModal(type) {
            document.getElementById('modal-title').innerText = type === 'login' ? 'Login' : 'Register';
            // Save the action type in the button attribute so handleAuth knows what to do
            document.getElementById('auth-modal').dataset.type = type;
            document.getElementById('auth-modal').style.display = 'flex';
        }

        function hideModal() { document.getElementById('auth-modal').style.display = 'none'; }

        async function loadProducts() {
            // 1. Get values from both dropdowns
            const genre = document.getElementById('genre-filter').value;
            const dev = document.getElementById('dev-filter').value;

            try {
                // 2. Construct the URL with both parameters
                const url = `/api/games?genre=${encodeURIComponent(genre)}&dev=${encodeURIComponent(dev)}`;

                const response = await fetch(url);
                const games = await response.json();

                const list = document.getElementById('product-list');
                list.innerHTML = games.map(g => `
            <div class="game-card">
                <h3>${g.name}</h3>
                <p>Price: $${g.price}</p>
                <button class="btn" onclick="addToCart(${g.id})">Add to cart</button>
            </div>
        `).join('');
            } catch (err) {
                console.error("Error loading products:", err);
            }
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const type = document.getElementById('auth-modal').dataset.type; // login or signup

            const endpoint = `/api/auth/${type}`;

            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const result = await response.json();

            if (response.ok) {
                currentUser = email;
                updateUI();
                hideModal();
                alert(type === 'login' ? "Welcome back!" : "Registration successful!");
            } else {
                alert(result.message || "Authentication error");
            }
        }

        function logout() {
            currentUser = null;
            updateUI();
            alert("You are logged out");
        }

        function updateUI() {
            const authButtons = document.getElementById('auth-buttons');
            const userInfo = document.getElementById('user-info');
            const usernameSpan = document.getElementById('username');

            if (currentUser) {
                authButtons.style.display = 'none';
                userInfo.style.display = 'block';
                usernameSpan.innerText = currentUser;
            } else {
                authButtons.style.display = 'block';
                userInfo.style.display = 'none';
            }
        }

        async function addToCart(productId) {
            if (!currentUser) {
                alert("Log in to your account first!");
                return;
            }
            alert("Product added! (We'll implement the cart logic with a 10-item limit next)");
        }

        // Run on page load
        loadProducts();
    </script>

</body>
</html>
